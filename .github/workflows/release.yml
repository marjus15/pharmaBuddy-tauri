name: Automated PharmaBuddy Release

on:
  push:
    branches:
      - master # Το pipeline θα τρέχει αυτόματα μόνο όταν κάνεις push ή merge στη main

jobs:
  build-and-deploy:
    runs-on: windows-latest # Χρειαζόμαστε Windows runner για να βγει το .exe

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: |
          npm install

      # Required repo secrets: SUPABASE_FUNCTIONS_URL, SUPABASE_ANON_KEY
      - name: Verify release secrets
        shell: bash
        run: |
          if [ -z "${{ secrets.SUPABASE_FUNCTIONS_URL }}" ]; then
            echo "::error::Missing GitHub secret SUPABASE_FUNCTIONS_URL"
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "::error::Missing GitHub secret SUPABASE_ANON_KEY"
            exit 1
          fi

      - name: Build Tauri Application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Baked into the binary at compile time — no .env needed on pharmacy PCs
          SUPABASE_FUNCTIONS_URL: ${{ secrets.SUPABASE_FUNCTIONS_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          PHARMABUDDY_PROFILE: prod
        with:
          tagName: v__VERSION__ # Θα πάρει αυτόματα το version από το tauri.conf.json
          releaseName: "PharmaBuddy v__VERSION__"
          releaseBody: "Production build with embedded Supabase config. Install and scan — no manual setup required."
          releaseDraft: false
          prerelease: false
